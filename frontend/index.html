<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Solar Permit Checker</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --sun: #F5A623;
      --sun-dark: #E08B00;
      --bg: #0D0F12;
      --surface: #161A1F;
      --surface2: #1E2328;
      --border: #2A2F36;
      --text: #E8EAF0;
      --text-muted: #6B7280;
      --pass: #22C55E;
      --fail: #EF4444;
      --warn: #F59E0B;
      --missing: #6B7280;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 60px 24px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    header {
      margin-bottom: 56px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--sun);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo-text {
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      color: var(--sun);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    h1 {
      font-family: 'Space Mono', monospace;
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    h1 span { color: var(--sun); }

    .subtitle {
      color: var(--text-muted);
      font-size: 16px;
      font-weight: 300;
      max-width: 480px;
      line-height: 1.6;
    }

    /* Upload zone */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 56px 32px;
      text-align: center;
      background: var(--surface);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      margin-bottom: 32px;
    }

    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--sun);
      background: rgba(245, 166, 35, 0.04);
    }

    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-icon {
      font-size: 40px;
      margin-bottom: 16px;
      display: block;
    }

    .upload-title {
      font-family: 'Space Mono', monospace;
      font-size: 16px;
      margin-bottom: 8px;
      color: var(--text);
    }

    .upload-sub {
      font-size: 13px;
      color: var(--text-muted);
    }

    .file-selected {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 24px;
    }

    .file-icon { font-size: 22px; }

    .file-name {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: var(--sun);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .remove-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 18px;
      padding: 0 4px;
      transition: color 0.2s;
    }

    .remove-btn:hover { color: var(--fail); }

    /* Button */
    .btn {
      width: 100%;
      padding: 16px 32px;
      background: var(--sun);
      color: #0D0F12;
      border: none;
      border-radius: 10px;
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:hover { background: var(--sun-dark); }
    .btn:active { transform: scale(0.99); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Loading */
    .loading {
      text-align: center;
      padding: 48px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--sun);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: var(--text-muted);
    }

    /* Results */
    .results {
      animation: fadeUp 0.4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .results-title {
      font-family: 'Space Mono', monospace;
      font-size: 18px;
    }

    .summary-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      font-family: 'Space Mono', monospace;
    }

    .pill.pass { background: rgba(34,197,94,0.15); color: var(--pass); }
    .pill.fail { background: rgba(239,68,68,0.15); color: var(--fail); }
    .pill.warn { background: rgba(245,158,11,0.15); color: var(--warn); }
    .pill.missing { background: rgba(107,114,128,0.15); color: var(--missing); }

    /* Fields extracted */
    .fields-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 24px;
    }

    .fields-title {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 16px;
    }

    .fields-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }

    .field-item {
      background: var(--surface2);
      border-radius: 8px;
      padding: 10px 14px;
    }

    .field-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .field-value {
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      color: var(--sun);
    }

    .field-value.null { color: var(--text-muted); font-size: 12px; }

    /* Check cards */
    .checks-list { display: flex; flex-direction: column; gap: 10px; }

    .check-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      transition: border-color 0.2s;
    }

    .check-card:hover { border-color: var(--border); }
    .check-card.pass { border-left: 3px solid var(--pass); }
    .check-card.fail { border-left: 3px solid var(--fail); }
    .check-card.warning { border-left: 3px solid var(--warn); }
    .check-card.missing_data { border-left: 3px solid var(--missing); }

    .check-icon { font-size: 18px; margin-top: 1px; flex-shrink: 0; }

    .check-body { flex: 1; }

    .check-rule {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 4px;
      color: var(--text);
    }

    .check-message {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 6px;
    }

    .check-ref {
      font-size: 11px;
      color: var(--text-muted);
      opacity: 0.6;
      font-style: italic;
    }

    .status-badge {
      font-size: 10px;
      font-family: 'Space Mono', monospace;
      padding: 3px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .status-badge.pass { background: rgba(34,197,94,0.15); color: var(--pass); }
    .status-badge.fail { background: rgba(239,68,68,0.15); color: var(--fail); }
    .status-badge.warning { background: rgba(245,158,11,0.15); color: var(--warn); }
    .status-badge.missing_data { background: rgba(107,114,128,0.15); color: var(--missing); }

    /* Error */
    .error-box {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      padding: 16px 20px;
      color: var(--fail);
      font-size: 14px;
      margin-bottom: 24px;
    }

    /* Disclaimer */
    .disclaimer {
      margin-top: 40px;
      padding: 16px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .disclaimer strong { color: var(--warn); }

    /* Reset */
    .reset-btn {
      margin-top: 24px;
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-muted);
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .reset-btn:hover { border-color: var(--sun); color: var(--sun); }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">
      <div class="logo-icon">☀️</div>
      <span class="logo-text">NewSolProduct</span>
    </div>
    <h1>Solar Permit <span>Plan Checker</span></h1>
    <p class="subtitle">Upload a solar permit PDF to automatically check it against NEC 690/705 and common code requirements.</p>
  </header>

  <div id="app"></div>
</div>

<script>
  const API_URL = "http://localhost:8000";

  const statusIcon = { pass: "✅", fail: "❌", warning: "⚠️", missing_data: "🔍" };
  const statusLabel = { pass: "Pass", fail: "Fail", warning: "Warning", missing_data: "No Data" };

  let selectedFile = null;

  function render(state) {
    const app = document.getElementById("app");

    if (state.loading) {
      app.innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <p class="loading-text">Parsing plan set and running checks...</p>
        </div>`;
      return;
    }

    if (state.result) {
      const checks = state.result.checks;
      const counts = { pass: 0, fail: 0, warning: 0, missing_data: 0 };
      checks.forEach(c => counts[c.status] = (counts[c.status] || 0) + 1);
      const fields = state.result.extracted_fields;

      const fieldLabels = {
        module_count: "Module Count", module_wattage: "Module Wattage (W)",
        system_size_kw: "System Size (kW)", wire_gauge_awg: "Wire Gauge (AWG)",
        inverter: "Inverter", breaker_amps: "Breaker (A)",
        voltage: "Voltage (V)", nec_version: "NEC Version",
        has_rapid_shutdown: "Rapid Shutdown", has_dc_disconnect: "DC Disconnect",
        has_pv_warning_label: "PV Warning Label"
      };

      app.innerHTML = `
        <div class="results">
          <div class="results-header">
            <div class="results-title">📋 ${state.result.filename}</div>
            <div class="summary-pills">
              ${counts.pass ? `<span class="pill pass">✅ ${counts.pass} Pass</span>` : ""}
              ${counts.fail ? `<span class="pill fail">❌ ${counts.fail} Fail</span>` : ""}
              ${counts.warning ? `<span class="pill warn">⚠️ ${counts.warning} Warning</span>` : ""}
              ${counts.missing_data ? `<span class="pill missing">🔍 ${counts.missing_data} No Data</span>` : ""}
            </div>
          </div>

          <div class="fields-card">
            <div class="fields-title">Extracted Fields (${state.result.pages_parsed} pages parsed)</div>
            <div class="fields-grid">
              ${Object.entries(fields).map(([k, v]) => `
                <div class="field-item">
                  <div class="field-label">${fieldLabels[k] || k}</div>
                  <div class="field-value ${v === null || v === false ? 'null' : ''}">
                    ${v === null ? "Not found" : v === true ? "Yes" : v === false ? "No" : v}
                  </div>
                </div>
              `).join("")}
            </div>
          </div>

          <div class="checks-list">
            ${checks.map(c => `
              <div class="check-card ${c.status}">
                <span class="check-icon">${statusIcon[c.status] || "•"}</span>
                <div class="check-body">
                  <div class="check-rule">${c.rule}</div>
                  <div class="check-message">${c.message}</div>
                  <div class="check-ref">${c.reference}</div>
                </div>
                <span class="status-badge ${c.status}">${statusLabel[c.status]}</span>
              </div>
            `).join("")}
          </div>

          <button class="reset-btn" onclick="resetApp()">← Check Another Plan</button>
        </div>`;
      return;
    }

    // Default: upload screen
    app.innerHTML = `
      ${state.error ? `<div class="error-box">⚠️ ${state.error}</div>` : ""}
      <div class="upload-zone" id="dropZone">
        <input type="file" accept=".pdf" id="fileInput" />
        <span class="upload-icon">📄</span>
        <div class="upload-title">Drop your permit PDF here</div>
        <div class="upload-sub">or click to browse — PDF files only</div>
      </div>
      <div id="fileInfo"></div>
      <button class="btn" id="submitBtn" disabled>Run Compliance Check</button>
      <div class="disclaimer">
        <strong>⚠️ Advisory Tool Only:</strong> This tool is for pre-check assistance and does not replace official plan review. Final approval is the responsibility of the licensed plan reviewer or AHJ. Always verify results against the applicable code edition.
      </div>`;

    document.getElementById("fileInput").addEventListener("change", e => {
      if (e.target.files[0]) setFile(e.target.files[0]);
    });

    document.getElementById("submitBtn").addEventListener("click", submitFile);

    const dz = document.getElementById("dropZone");
    dz.addEventListener("dragover", e => { e.preventDefault(); dz.classList.add("drag-over"); });
    dz.addEventListener("dragleave", () => dz.classList.remove("drag-over"));
    dz.addEventListener("drop", e => {
      e.preventDefault(); dz.classList.remove("drag-over");
      const f = e.dataTransfer.files[0];
      if (f && f.name.endsWith(".pdf")) setFile(f);
    });

    if (selectedFile) renderFileInfo();
  }

  function setFile(f) {
    selectedFile = f;
    renderFileInfo();
    document.getElementById("submitBtn").disabled = false;
  }

  function renderFileInfo() {
    const fi = document.getElementById("fileInfo");
    if (!fi || !selectedFile) return;
    fi.innerHTML = `
      <div class="file-selected">
        <span class="file-icon">📄</span>
        <span class="file-name">${selectedFile.name}</span>
        <button class="remove-btn" onclick="clearFile()">✕</button>
      </div>`;
  }

  function clearFile() {
    selectedFile = null;
    document.getElementById("fileInfo").innerHTML = "";
    document.getElementById("submitBtn").disabled = true;
  }

  async function submitFile() {
    if (!selectedFile) return;
    render({ loading: true });

    const formData = new FormData();
    formData.append("file", selectedFile);

    try {
      const res = await fetch(`${API_URL}/check`, { method: "POST", body: formData });
      if (!res.ok) {
        const err = await res.json();
        render({ error: err.detail || "Server error. Is the backend running?" });
        return;
      }
      const data = await res.json();
      render({ result: data });
    } catch (e) {
      render({ error: "Cannot connect to backend. Make sure the Python server is running on port 8000." });
    }
  }

  function resetApp() {
    selectedFile = null;
    render({});
  }

  render({});
</script>
</body>
</html>
